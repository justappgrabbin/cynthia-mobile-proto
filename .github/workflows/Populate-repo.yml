## Troubleshooting

**"Workflow not found"?**
- Make sure `.github/workflows/` folder exists
- File must end in `.yml`

**"Build failed"?**
- Check that `EXPO_TOKEN` is correct
- Make sure repo has code pushed
- Check Actions tab for error logs

**"APK won't install"?**
- Enable "Unknown Sources" in Android settings
- Make sure download completed fully

