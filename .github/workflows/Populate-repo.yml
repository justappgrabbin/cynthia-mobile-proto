## Step-by-Step: Get Your APK

### 1. Create Empty GitHub Repo
- Go to https://github.com/new
- Name: `cynthia-mobile-proto`
- **DO NOT** initialize with README (keep it empty!)
- Click **Create repository**

### 2. Upload ONLY the Workflow Files

You only need to upload these 3 files to GitHub:

```
.github/
  workflows/
    generate-complete-app.yml    ← This generates everything else
    build-apk.yml                ← This builds the APK
eas.json                         ← Build configuration
```

**How to upload:**
1. In your empty GitHub repo, click "uploading an existing file"
2. Drag and drop the workflow files
3. Commit to main

### 3. Run the Generator Workflow

1. Go to **Actions** tab in your repo
2. Click **🔱 Generate Complete Cynthia App**
3. Click **Run workflow**
4. Wait 2-3 minutes

**What happens:**
- ✅ Creates all directories
- ✅ Generates App.js
- ✅ Generates all screen files
- ✅ Generates context files (Auth, App, Trident)
- ✅ Generates service files (API, NCP)
- ✅ Commits everything to your repo

### 4. Add EXPO_TOKEN Secret

1. Go to https://expo.dev/signup (create account)
2. Go to https://expo.dev/settings/access-tokens
3. Generate new token → Copy it
4. In GitHub repo → **Settings** → **Secrets and variables** → **Actions**
5. Click **New repository secret**
6. Name: `EXPO_TOKEN`
7. Value: Paste your Expo token
8. Click **Add secret**

### 5. Build Your APK

1. Go to **Actions** tab
2. Click **Build Cynthia APK**
3. Click **Run workflow**
4. Select `apk` from dropdown
5. Click **Run workflow**

**Wait 10-15 minutes...**

### 6. Download Your APK!

When build completes:
1. Go to **Releases** section (right side of repo)
2. Find the latest release
3. Download `cynthia-app.apk`
4. Install on your Android phone!

